services:

  nginx:
    image: nginx:alpine
    container_name: nginx
    ports:
      - 80:8080
      - 443:8443
    volumes:
      - $HOME/docker-compose/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - $HOME/docker-compose/nginx/conf.d/:/etc/nginx/conf.d/:ro
      - $HOME/docker-compose/nginx/stream.d/:/etc/nginx/stream.d/:ro
      - $HOME/docker-compose/nginx/snippets/:/etc/nginx/snippets/:ro
      - $HOME/docker-compose/nginx/cert/:/etc/cert/:ro
      - $HOME/docker-compose/nginx/auth/:/etc/nginx/auth/:ro
      - $HOME/docker-compose/certbot/etc/letsencrypt/:/etc/letsencrypt/:ro
      - $HOME/data/nginx/logs/:/var/log/nginx/
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - xray
    deploy:
      resources:
        limits:
          memory: 64M
    restart: unless-stopped

  xray:
    image: teddysun/xray
    container_name: xray
    volumes:
      - $HOME/docker-compose/xray/:/etc/xray:ro
    restart: unless-stopped

  # https://gist.github.com/sergiks/4c1ccddc097e61e6fe5e45c53072a944
  certbot:
    image: certbot/dns-cloudflare
    container_name: certbot
    environment:
      - TZ=Asia/Shanghai
    volumes:
      - $HOME/docker-compose/certbot/etc/letsencrypt:/etc/letsencrypt
      - $HOME/data/certbot/var/lib/letsencrypt:/var/lib/letsencrypt
      - $HOME/data/certbot/var/log/letsencrypt:/var/log/letsencrypt
      - $HOME/docker-compose/certbot/cloudflare.ini:/etc/cloudflare.ini:ro
    profiles:
      - manual  # 添加 profile，防止随 docker compose up 自动启动