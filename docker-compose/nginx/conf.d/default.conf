# HTTP 80 端口 - 重定向到 HTTPS
server {
    listen 8080 default_server;
    listen [::]:8080 default_server;
    server_name _;

    # 健康检查
    location /health {
        return 200 'OK\n';
        add_header Content-Type text/plain;
    }

    # 其他请求重定向到 HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS 伪装站点 - 接收 PROXY Protocol
server {
    listen 9443 ssl proxy_protocol;
    listen [::]:9443 ssl proxy_protocol;
    http2 on;
    server_name _;

    # 获取真实客户端 IP
    set_real_ip_from 127.0.0.0/8;
    set_real_ip_from 10.0.0.0/8;
    set_real_ip_from 172.16.0.0/12;
    set_real_ip_from 192.168.0.0/16;
    real_ip_header proxy_protocol;

    # SSL 配置
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # SSL 证书 (使用通配符证书或默认证书)
    ssl_certificate /etc/letsencrypt/live/__DOMAIN__/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/__DOMAIN__/privkey.pem;

    # 隐藏版本信息
    server_tokens off;

    # 安全头
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;

    access_log /var/log/nginx/default_https.log json_combined;

    location / {
        # 反向代理到真实站点作为伪装
        proxy_ssl_server_name on;
        proxy_ssl_name __FALLBACK_DOMAIN__;
        proxy_pass https://__FALLBACK_DOMAIN__:443/;
        proxy_set_header Host __FALLBACK_DOMAIN__;
        include /etc/nginx/snippets/proxy-common.conf;
    }
}
