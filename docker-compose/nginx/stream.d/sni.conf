# SNI 分流配置

# Docker 内部 DNS 解析器
resolver 127.0.0.11 valid=30s ipv6=off;

# 日志格式
log_format stream_log '$remote_addr [$time_local] '
                      '$protocol $status $bytes_sent $bytes_received '
                      '$session_time "$upstream_addr" '
                      '"$ssl_preread_server_name"';

access_log /var/log/nginx/stream.log stream_log;

# SNI 分流映射
map $ssl_preread_server_name $backend_name {
    # xray 域名 → 转发到 xray
    itunes.apple.com          xray_backend;
    # headscale 域名 → 转发到 headscale 后端
    # 默认回落到本地 HTTPS 伪装站点
    default                   web_backend;
}

# xray 后端
upstream xray_backend {
    server xray:6443;
}

# nginx 伪装站点后端 (本地 HTTP 层处理 SSL)
upstream web_backend {
    server 127.0.0.1:9443;
}

# headscale 后端
upstream headscale_backend {
    server 127.0.0.1:9444;
}

# 443 端口 SNI 分流入口
server {
    listen 8443;
    listen [::]:8443;
    
    ssl_preread on;
    proxy_pass $backend_name;
    
    # 传递真实客户端 IP（通过 PROXY Protocol）
    proxy_protocol on;
    
    # 超时设置
    proxy_connect_timeout 10s;
    proxy_timeout 300s;
}
